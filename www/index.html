<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDFUSION PRO</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:sans-serif;overflow:hidden;}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;color:#00ff99;z-index:10;}
#splash img{width:140px;margin-bottom:18px}
#app{position:fixed;inset:0;display:none;background:#07111F;color:#fff;}
header{padding:18px 16px;font-size:20px;font-weight:700;color:#00eaff;display:flex;align-items:center;gap:10px;}
iframe{width:100%;height:calc(100% - 64px);border:0;background:#fff;}
</style>
</head>
<body>
<div id="splash">
  <img src="logo.png" alt="PDFUSION">
  <h1>PDFUSION PRO</h1>
  <p>Initializing secure systems...</p>
</div>

<div id="app">
  <header>PDFUSION PRO</header>
  <iframe src="https://pdfusion9-cyber.github.io/pdfusion9.github.io/"></iframe>
</div>

<script>
setTimeout(() => {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}, 1800);
</script>
</body>
</html>
